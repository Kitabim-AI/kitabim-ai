# Backend API Deployment and Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kitabim
  labels:
    app: kitabim
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitabim
      component: backend
  template:
    metadata:
      labels:
        app: kitabim
        component: backend
    spec:
      containers:
        - name: backend
          image: kitabim-backend:local
          imagePullPolicy: Never # Use locally built image
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: kitabim-config
            - secretRef:
                name: kitabim-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
      volumes:
        - name: data
          hostPath:
            path: /Users/Omarjan/Projects/kitabim-ai/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kitabim
  labels:
    app: kitabim
    component: backend
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
      name: http
  selector:
    app: kitabim
    component: backend
