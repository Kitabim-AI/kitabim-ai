# Worker Deployment — runs arq worker.WorkerSettings
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: kitabim
  labels:
    app: kitabim
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitabim
      component: worker
  template:
    metadata:
      labels:
        app: kitabim
        component: worker
    spec:
      containers:
        - name: worker
          image: kitabim-worker:local
          imagePullPolicy: Never
          command: ["arq", "worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: kitabim-config
            - secretRef:
                name: kitabim-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: gcs-key
              mountPath: /etc/gcs
              readOnly: true
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/gcs/key.json
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          hostPath:
            path: /Users/Omarjan/Projects/kitabim-ai/data
            type: DirectoryOrCreate
        - name: gcs-key
          secret:
            secretName: kitabim-gcs-key
            optional: true
