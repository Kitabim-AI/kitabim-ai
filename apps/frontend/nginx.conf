server {
  listen 80;
  server_name _;
  client_max_body_size 512M;

  root /usr/share/nginx/html;
  index index.html;

  # API proxy - use ^~ to prevent regex locations from matching
  location ^~ /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Increase timeouts for long-running operations like spell check
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # Cache static assets with versioned names (excluding /api/ paths)
  location ~* ^/(?!api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Never cache HTML files
  location ~* \.html$ {
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    add_header Cross-Origin-Embedder-Policy "unsafe-none";
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri /index.html;
  }

  location / {
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri /index.html;
  }
}
