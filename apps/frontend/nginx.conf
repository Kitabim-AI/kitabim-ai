server {
  listen 80;
  server_name _;
  client_max_body_size 512M;

  root /usr/share/nginx/html;
  index index.html;

  # API proxy - use ^~ to prevent regex locations from matching
  location ^~ /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection '';

    # Disable buffering for SSE streaming
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    # Increase timeouts for long-running operations like spell check
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # Cache static assets with versioned names (excluding /api/ paths)
  location ~* ^/(?!api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Never cache HTML files
  location ~* \.html$ {
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    add_header Cross-Origin-Embedder-Policy "unsafe-none";
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    # CSP for the React SPA:
    # - No unsafe-inline in script-src: Vite production builds use external JS files only.
    # - unsafe-eval kept in script-src: required by pdf.js worker internals.
    # - worker-src blob: required by pdf.js web worker instantiation.
    # - unsafe-inline in style-src: React inline style props and Tailwind utilities.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https://accounts.google.com https://graph.facebook.com; frame-src 'self' https://accounts.google.com; object-src 'none'; worker-src 'self' blob:;";
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri /index.html;
  }

  location / {
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https://accounts.google.com https://graph.facebook.com; frame-src 'self' https://accounts.google.com; object-src 'none'; worker-src 'self' blob:;";
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri /index.html;
  }
}
