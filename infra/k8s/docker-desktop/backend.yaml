apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kitabim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongo 27017; do echo "waiting for mongo"; sleep 2; done
              until nc -z redis 6379; do echo "waiting for redis"; sleep 2; done
      containers:
        - name: backend
          image: kitabim-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: kitabim-config
            - secretRef:
                name: kitabim-secrets
          volumeMounts:
            - name: kitabim-data
              mountPath: /data
      volumes:
        - name: kitabim-data
          persistentVolumeClaim:
            claimName: kitabim-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kitabim
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
