apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: kitabim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do echo "waiting for redis"; sleep 2; done

      containers:
        - name: worker
          image: kitabim-worker:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: kitabim-config
            - secretRef:
                name: kitabim-secrets
          volumeMounts:
            - name: kitabim-data
              mountPath: /data
      volumes:
        - name: kitabim-data
          persistentVolumeClaim:
            claimName: kitabim-data-pvc
