<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <style>
    .box { fill: #f7f3ea; stroke: #2e2a24; stroke-width: 2; }
    .title { font: 600 22px serif; fill: #2e2a24; }
    .text { font: 16px serif; fill: #2e2a24; }
    .arrow { stroke: #2e2a24; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e2a24" />
    </marker>
  </defs>

  <rect x="60" y="40" width="1080" height="740" rx="20" class="box"/>
  <text x="100" y="90" class="title">Reader Chat Answer Flow (Current Book + All Volumes)</text>

  <rect x="120" y="130" width="430" height="90" rx="12" class="box"/>
  <text x="140" y="170" class="text">1) Receive question + history</text>
  <text x="140" y="195" class="text">bookId/currentPage from request</text>

  <rect x="650" y="130" width="430" height="90" rx="12" class="box"/>
  <text x="670" y="170" class="text">2) Author-title shortcuts</text>
  <text x="670" y="195" class="text">(if author query → direct answer)</text>

  <line x1="550" y1="175" x2="650" y2="175" class="arrow"/>

  <rect x="120" y="260" width="430" height="120" rx="12" class="box"/>
  <text x="140" y="300" class="text">3) Load current book</text>
  <text x="140" y="325" class="text">Compute current page context</text>
  <text x="140" y="350" class="text">Build chat history (last 6)</text>

  <rect x="650" y="260" width="430" height="120" rx="12" class="box"/>
  <text x="670" y="300" class="text">4) Find all volumes</text>
  <text x="670" y="325" class="text">Query by title + author</text>
  <text x="670" y="350" class="text">Build related_books list</text>

  <line x1="550" y1="320" x2="650" y2="320" class="arrow"/>

  <rect x="120" y="420" width="430" height="150" rx="12" class="box"/>
  <text x="140" y="460" class="text">5) Collect pages from all volumes</text>
  <text x="140" y="485" class="text">Use completed pages + embeddings</text>
  <text x="140" y="510" class="text">Score by semantic + keyword</text>
  <text x="140" y="535" class="text">Select top results (fallback if none)</text>

  <rect x="650" y="420" width="430" height="150" rx="12" class="box"/>
  <text x="670" y="460" class="text">6) Build final context</text>
  <text x="670" y="485" class="text">Include current page + top pages</text>
  <text x="670" y="510" class="text">Fallback: book-level excerpt</text>

  <line x1="550" y1="495" x2="650" y2="495" class="arrow"/>

  <rect x="120" y="610" width="960" height="120" rx="12" class="box"/>
  <text x="140" y="650" class="text">7) Generate answer (Gemini)</text>
  <text x="140" y="675" class="text">Prompt = [context + instructions + question] + chat history</text>
  <text x="140" y="700" class="text">Return response.text</text>

  <line x1="335" y1="570" x2="335" y2="610" class="arrow"/>
  <line x1="865" y1="570" x2="865" y2="610" class="arrow"/>
</svg>
