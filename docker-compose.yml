services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  uyghurocr:
    build:
      context: ./services/uyghurocr
    ports:
      - "8001:8001"

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    env_file:
      - .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      OCR_PROVIDER: local
      LOCAL_OCR_URL: http://uyghurocr:8001
      DATA_DIR: /data
    volumes:
      - kitabim_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis
      - uyghurocr

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file:
      - .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      OCR_PROVIDER: local
      LOCAL_OCR_URL: http://uyghurocr:8001
      DATA_DIR: /data
    command: ["python", "-m", "arq", "app.worker.WorkerSettings"]
    volumes:
      - kitabim_data:/data
    depends_on:
      - mongo
      - redis
      - uyghurocr

volumes:
  mongo_data:
  kitabim_data:
