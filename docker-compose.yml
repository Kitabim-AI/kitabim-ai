services:
  # ─── PostgreSQL (Database) ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      POSTGRES_DB: kitabim-ai
      POSTGRES_USER: kitabim
      POSTGRES_PASSWORD: kitabim
    ports:
      - "5532:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitabim -d kitabim-ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis (Job Queue + Cache) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: kitabim-backend:local
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://kitabim:kitabim@postgres:5432/kitabim-ai
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/gcs/key.json
      # Connection pool settings (loaded from .env but explicitly listed for visibility)
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-7}
    ports:
      - "30800:8000"
    volumes:
      - ./data:/app/data
      - ./gcs-key.json:/etc/gcs/key.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 300s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Worker (ARQ - always running) ───────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: kitabim-worker:local
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://kitabim:kitabim@postgres:5432/kitabim-ai
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/gcs/key.json
      # Connection pool settings (loaded from .env but explicitly listed for visibility)
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-7}
    volumes:
      - ./data:/app/data
      - ./gcs-key.json:/etc/gcs/key.json:ro
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Frontend (React/Vite served via Nginx) ───────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    image: kitabim-frontend:local
    restart: always
    ports:
      - "30080:80"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
